<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Abbey Daily</title>
<meta name="description" content="A daily verse, catechism, and prayer companion from The Abbey at Pawleys Island.">
<meta name="theme-color" content="#3c5b3b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Abbey Daily">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --abbey-green:#3c5b3b;
    --midnight:#00264d;
    --sage:#8b9576;
    --parchment:#d4c4ab;
    --parchment-60:#e8dfce;
    --parchment-field:#f3ede1;
    --ochre:#b69564;
    --ink:#26231c;
    --serif:'EB Garamond', Garamond, 'Times New Roman', serif;
    --sans:'Avenir Next', Avenir, 'Segoe UI', system-ui, sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{height:100%}
  body{
    font-family:var(--serif);
    background:var(--parchment-field);
    color:var(--ink);
    min-height:100%;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- header ---------- */
  header{
    background:var(--abbey-green);
    color:var(--parchment-60);
    padding:calc(env(safe-area-inset-top) + 18px) 20px 16px;
    text-align:center;
  }
  .wordmark{
    font-family:var(--sans);
    font-size:13px;
    font-weight:600;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:#f3ede1;
  }
  .wordmark span{color:var(--ochre)}
  .dateline{
    margin-top:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
  }
  .dateline .date{
    font-family:var(--serif);
    font-style:italic;
    font-size:16.5px;
    color:var(--parchment);
  }
  .daynav{
    background:none;border:1px solid rgba(212,196,171,.45);
    color:var(--parchment);
    width:30px;height:30px;border-radius:50%;
    font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex:0 0 auto;
  }
  .daynav:active{background:rgba(212,196,171,.18)}
  .today-btn{
    display:none;
    margin:9px auto 0;
    background:none;border:none;
    font-family:var(--sans);
    font-size:10.5px;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;
    color:var(--ochre);
    cursor:pointer;
    padding:3px 8px;
  }
  .today-btn.show{display:inline-block}

  /* ---------- layout ---------- */
  main{
    max-width:560px;
    margin:0 auto;
    padding:26px 22px calc(env(safe-area-inset-bottom) + 108px);
  }
  section{display:none}
  section.active{display:block;animation:rise .35s ease}
  @keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){section.active{animation:none}}

  .eyebrow{
    font-family:var(--sans);
    font-size:11px;
    font-weight:600;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:var(--sage);
    text-align:center;
  }
  .rule{
    width:44px;height:1px;background:var(--ochre);
    margin:14px auto 0;
    position:relative;
  }
  .rule::after{
    content:"";
    position:absolute;left:50%;top:-2.5px;
    width:6px;height:6px;
    background:var(--ochre);
    transform:translateX(-50%) rotate(45deg);
  }

  /* ---------- verse ---------- */
  .verse-card{margin-top:30px;text-align:left}
  .verse-text{
    font-size:26px;
    line-height:1.52;
    color:var(--midnight);
  }
  .verse-text::first-letter{
    font-size:2.55em;
    line-height:.82;
    float:left;
    padding:6px 10px 0 0;
    color:var(--ochre);
    font-weight:500;
  }
  .verse-ref{
    margin-top:26px;
    font-family:var(--sans);
    font-size:12.5px;
    font-weight:600;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--abbey-green);
    text-align:right;
  }
  .verse-note{
    margin-top:6px;
    font-family:var(--serif);
    font-style:italic;
    font-size:13.5px;
    color:var(--sage);
    text-align:right;
  }

  /* ---------- catechism ---------- */
  .cat-card{margin-top:30px}
  .cat-q{
    font-size:22.5px;
    font-weight:600;
    line-height:1.4;
    color:var(--midnight);
  }
  .cat-q .qmark, .cat-a .amark{
    color:var(--ochre);
    font-weight:600;
    padding-right:8px;
  }
  .cat-a{
    margin-top:20px;
    font-size:19.5px;
    line-height:1.62;
  }
  .cat-refs{
    margin-top:20px;
    font-size:15px;
    font-style:italic;
    color:var(--sage);
    line-height:1.5;
  }
  .cat-source{
    margin-top:30px;
    padding-top:16px;
    border-top:1px solid var(--parchment);
    font-family:var(--sans);
    font-size:10.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--sage);
    text-align:center;
    line-height:1.9;
  }
  .setup-card{
    margin-top:30px;
    background:var(--parchment-60);
    border:1px solid var(--parchment);
    border-radius:10px;
    padding:22px;
    font-size:17px;
    line-height:1.6;
  }
  .setup-card code{
    font-family:ui-monospace,Menlo,monospace;
    font-size:14px;
    background:#fff;
    padding:1px 6px;
    border-radius:4px;
  }

  /* ---------- prayer ---------- */
  .pray-head{
    margin-top:26px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  .pray-title{
    font-size:21px;
    font-weight:600;
    color:var(--midnight);
  }
  .pray-progress{
    font-family:var(--sans);
    font-size:12px;
    font-weight:600;
    letter-spacing:.12em;
    color:var(--sage);
  }
  .pray-intro{
    margin-top:6px;
    font-style:italic;
    font-size:15.5px;
    color:var(--sage);
  }
  .pray-list{margin-top:18px;list-style:none}
  .pray-row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 4px;
    border-bottom:1px solid var(--parchment-60);
    cursor:pointer;
    user-select:none;-webkit-user-select:none;
  }
  .pmark{
    flex:0 0 auto;
    width:28px;height:28px;
    border:1.5px solid var(--sage);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    transition:all .18s ease;
  }
  .pmark svg{width:15px;height:15px;opacity:0;transform:scale(.6);transition:all .18s ease}
  .pray-row.done .pmark{background:var(--abbey-green);border-color:var(--abbey-green)}
  .pray-row.done .pmark svg{opacity:1;transform:scale(1)}
  .pname{font-size:19.5px;line-height:1.3}
  .pnote{
    font-size:14.5px;
    font-style:italic;
    color:var(--sage);
    margin-top:1px;
  }
  .pray-row.done .pname{color:var(--sage)}
  .premove{
    display:none;
    margin-left:auto;
    background:none;
    border:none;
    color:#a4432f;
    font-family:var(--sans);
    font-size:12px;
    font-weight:600;
    letter-spacing:.08em;
    cursor:pointer;
    padding:8px;
  }
  body.editing .premove{display:block}
  body.editing .pmark{opacity:.35}
  .pray-empty{
    margin-top:24px;
    text-align:center;
    font-style:italic;
    font-size:17px;
    color:var(--sage);
    line-height:1.6;
  }
  .pray-done-note{
    margin-top:22px;
    text-align:center;
    font-style:italic;
    font-size:16.5px;
    color:var(--abbey-green);
    display:none;
  }
  .pray-done-note.show{display:block}
  .pray-actions{
    margin-top:24px;
    display:flex;
    gap:10px;
  }
  .btn{
    font-family:var(--sans);
    font-size:12px;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    padding:12px 18px;
    border-radius:8px;
    border:1px solid var(--sage);
    background:none;
    color:var(--abbey-green);
    cursor:pointer;
  }
  .btn.primary{
    background:var(--abbey-green);
    border-color:var(--abbey-green);
    color:var(--parchment-field);
  }
  .add-form{
    display:none;
    margin-top:18px;
    background:var(--parchment-60);
    border:1px solid var(--parchment);
    border-radius:10px;
    padding:16px;
  }
  .add-form.show{display:block}
  .add-form input{
    width:100%;
    font-family:var(--serif);
    font-size:18px;
    padding:11px 12px;
    border:1px solid var(--parchment);
    border-radius:7px;
    background:#fffdf8;
    color:var(--ink);
    margin-bottom:10px;
  }
  .add-form input:focus{outline:2px solid var(--abbey-green);outline-offset:-1px}

  /* ---------- tab bar ---------- */
  nav{
    position:fixed;
    bottom:0;left:0;right:0;
    background:#fffdf8;
    border-top:1px solid var(--parchment);
    display:flex;
    justify-content:space-around;
    padding:8px 6px calc(env(safe-area-inset-bottom) + 8px);
  }
  .tab{
    flex:1;
    max-width:170px;
    background:none;border:none;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    font-family:var(--sans);
    font-size:10.5px;
    font-weight:600;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--sage);
    padding:6px 0 3px;
    cursor:pointer;
  }
  .tab svg{width:23px;height:23px;stroke:currentColor}
  .tab.active{color:var(--abbey-green)}
  .tab:focus-visible{outline:2px solid var(--abbey-green);border-radius:8px}
</style>
</head>
<body>

<header>
  <div class="wordmark">The Abbey <span>&#10013;</span> Daily</div>
  <div class="dateline">
    <button class="daynav" id="prevDay" aria-label="Previous day">&#8249;</button>
    <div class="date" id="dateline"></div>
    <button class="daynav" id="nextDay" aria-label="Next day">&#8250;</button>
  </div>
  <button class="today-btn" id="todayBtn">Return to today</button>
</header>

<main>
  <!-- VERSE -->
  <section id="verse" class="active">
    <div style="margin-top:2px" class="eyebrow" id="verseEyebrow"></div>
    <div class="rule"></div>
    <div class="verse-card">
      <p class="verse-text" id="verseText"></p>
      <div class="verse-ref" id="verseRef"></div>
      <div class="verse-note">King James Version</div>
    </div>
  </section>

  <!-- CATECHISM -->
  <section id="catechism">
    <div class="eyebrow" id="catEyebrow"></div>
    <div class="rule"></div>
    <div class="cat-card" id="catCard"></div>
  </section>

  <!-- PRAYER -->
  <section id="prayer">
    <div class="eyebrow">Daily Intercession</div>
    <div class="rule"></div>
    <div class="pray-head">
      <div class="pray-title">My prayer list</div>
      <div class="pray-progress" id="prayProgress"></div>
    </div>
    <p class="pray-intro">Tap each name as you pray. The list begins fresh each morning.</p>
    <ul class="pray-list" id="prayList"></ul>
    <p class="pray-empty" id="prayEmpty" style="display:none">
      No one on your list yet.<br>Add the people you carry before the Lord each day.
    </p>
    <p class="pray-done-note" id="prayDone">&#10013; You have prayed for everyone today.</p>
    <div class="pray-actions">
      <button class="btn primary" id="addBtn">+ Add a person</button>
      <button class="btn" id="editBtn">Edit list</button>
    </div>
    <div class="add-form" id="addForm">
      <input type="text" id="nameInput" placeholder="Name" autocomplete="off" maxlength="60">
      <input type="text" id="noteInput" placeholder="Prayer focus (optional)" autocomplete="off" maxlength="90">
      <div style="display:flex;gap:10px">
        <button class="btn primary" id="saveBtn">Add to list</button>
        <button class="btn" id="cancelBtn">Cancel</button>
      </div>
    </div>
  </section>
</main>

<nav>
  <button class="tab active" data-tab="verse" aria-label="Daily verse">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4.5C4.5 3.4 7 3.4 9.5 4.5c1 .45 1.7 1 2.5 1.8.8-.8 1.5-1.35 2.5-1.8 2.5-1.1 5-1.1 7.5 0v14c-2.5-1.1-5-1.1-7.5 0-1 .45-1.7 1-2.5 1.8-.8-.8-1.5-1.35-2.5-1.8-2.5-1.1-5-1.1-7.5 0v-14Z"/><path d="M12 6.3v14"/></svg>
    Verse
  </button>
  <button class="tab" data-tab="catechism" aria-label="Daily catechism">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9.2 9a3 3 0 0 1 5.8 1c0 2-3 2.6-3 4.5"/><path d="M12 18h.01"/><circle cx="12" cy="12" r="9.2"/></svg>
    Catechism
  </button>
  <button class="tab" data-tab="prayer" aria-label="Prayer list">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.2v17.6"/><path d="M5.6 8.4h12.8"/><path d="M8.2 20.8h7.6"/></svg>
    Prayer
  </button>
</nav>

ister, and to give his life a ransom for many."},{"r":"Mark 11:24","t":"Therefore I say unto you, What things soever ye desire, when ye pray, believe that ye receive them, and ye shall have them."},{"r":"Luke 1:37","t":"For with God nothing shall be impossible."},{"r":"Luke 2:10–11","t":"And the angel said unto them, Fear not: for, behold, I bring you good tidings of great joy, which shall be to all people. For unto you is born this day in the city of David a Saviour, which is Christ the Lord."},{"r":"Luke 2:14","t":"Glory to God in the highest, and on earth peace, good will toward men."},{"r":"Luke 6:31","t":"And as ye would that men should do to you, do ye also to them likewise."},{"r":"Luke 6:38","t":"Give, and it shall be given unto you; good measure, pressed down, and shaken together, and running over, shall men give into your bosom. For with the same measure that ye mete withal it shall be measured to you again."},{"r":"Luke 9:23","t":"And he said to them all, If any man will come after me, let him deny himself, and take up his cross daily, and follow me."},{"r":"Luke 10:27","t":"And he answering said, Thou shalt love the Lord thy God with all thy heart, and with all thy soul, and with all thy strength, and with all thy mind; and thy neighbour as thyself."},{"r":"Luke 12:32","t":"Fear not, little flock; for it is your Father’s good pleasure to give you the kingdom."},{"r":"Luke 12:34","t":"For where your treasure is, there will your heart be also."},{"r":"Luke 15:7","t":"I say unto you, that likewise joy shall be in heaven over one sinner that repenteth, more than over ninety and nine just persons, which need no repentance."},{"r":"Luke 19:10","t":"For the Son of man is come to seek and to save that which was lost."},{"r":"Luke 24:6","t":"He is not here, but is risen: remember how he spake unto you when he was yet in Galilee,"},{"r":"John 1:1","t":"In the beginning was the Word, and the Word was with God, and the Word was God."},{"r":"John 1:5","t":"And the light shineth in darkness; and the darkness comprehended it not."},{"r":"John 1:12","t":"But as many as received him, to them gave he power to become the sons of God, even to them that believe on his name:"},{"r":"John 1:14","t":"And the Word was made flesh, and dwelt among us, (and we beheld his glory, the glory as of the only begotten of the Father,) full of grace and truth."},{"r":"John 1:29","t":"The next day John seeth Jesus coming unto him, and saith, Behold the Lamb of God, which taketh away the sin of the world."},{"r":"John 3:3","t":"Jesus answered and said unto him, Verily, verily, I say unto thee, Except a man be born again, he cannot see the kingdom of God."},{"r":"John 3:16","t":"For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life."},{"r":"John 3:17","t":"For God sent not his Son into the world to condemn the world; but that the world through him might be saved."},{"r":"John 3:30","t":"He must increase, but I must decrease."},{"r":"John 4:24","t":"God is a Spirit: and they that worship him must worship him in spirit and in truth."},{"r":"John 6:35","t":"And Jesus said unto them, I am the bread of life: he that cometh to me shall never hunger; and he that believeth on me shall never thirst."},{"r":"John 8:12","t":"Then spake Jesus again unto them, saying, I am the light of the world: he that followeth me shall not walk in darkness, but shall have the light of life."},{"r":"John 8:32","t":"And ye shall know the truth, and the truth shall make you free."},{"r":"John 10:10","t":"The thief cometh not, but for to steal, and to kill, and to destroy: I am come that they might have life, and that they might have it more abundantly."},{"r":"John 10:11","t":"I am the good shepherd: the good shepherd giveth his life for the sheep."},{"r":"John 10:27–28","t":"My sheep hear my voice, and I know them, and they follow me: And I give unto them eternal life; and they shall never perish, neither shall any man pluck them out of my hand."},{"r":"John 11:25–26","t":"Jesus said unto her, I am the resurrection, and the life: he that believeth in me, though he were dead, yet shall he live: And whosoever liveth and believeth in me shall never die. Believest thou this?"},{"r":"John 13:34–35","t":"A new commandment I give unto you, That ye love one another; as I have loved you, that ye also love one another. By this shall all men know that ye are my disciples, if ye have love one to another."},{"r":"John 14:1","t":"Let not your heart be troubled: ye believe in God, believe also in me."},{"r":"John 14:2–3","t":"In my Father’s house are many mansions: if it were not so, I would have told you. I go to prepare a place for you. And if I go and prepare a place for you, I will come again, and receive you unto myself; that where I am, there ye may be also."},{"r":"John 14:6","t":"Jesus saith unto him, I am the way, the truth, and the life: no man cometh unto the Father, but by me."},{"r":"John 14:15","t":"If ye love me, keep my commandments."},{"r":"John 14:26","t":"But the Comforter, which is the Holy Ghost, whom the Father will send in my name, he shall teach you all things, and bring all things to your remembrance, whatsoever I have said unto you."},{"r":"John 14:27","t":"Peace I leave with you, my peace I give unto you: not as the world giveth, give I unto you. Let not your heart be troubled, neither let it be afraid."},{"r":"John 15:5","t":"I am the vine, ye are the branches: He that abideth in me, and I in him, the same bringeth forth much fruit: for without me ye can do nothing."},{"r":"John 15:11","t":"These things have I spoken unto you, that my joy might remain in you, and that your joy might be full."},{"r":"John 15:13","t":"Greater love hath no man than this, that a man lay down his life for his friends."},{"r":"John 16:33","t":"These things I have spoken unto you, that in me ye might have peace. In the world ye shall have tribulation: but be of good cheer; I have overcome the world."},{"r":"John 17:3","t":"And this is life eternal, that they might know thee the only true God, and Jesus Christ, whom thou hast sent."},{"r":"John 20:29","t":"Jesus saith unto him, Thomas, because thou hast seen me, thou hast believed: blessed are they that have not seen, and yet have believed."},{"r":"Acts 1:8","t":"But ye shall receive power, after that the Holy Ghost is come upon you: and ye shall be witnesses unto me both in Jerusalem, and in all Judaea, and in Samaria, and unto the uttermost part of the earth."},{"r":"Acts 2:38","t":"Then Peter said unto them, Repent, and be baptized every one of you in the name of Jesus Christ for the remission of sins, and ye shall receive the gift of the Holy Ghost."},{"r":"Acts 2:42","t":"And they continued stedfastly in the apostles’ doctrine and fellowship, and in breaking of bread, and in prayers."},{"r":"Acts 4:12","t":"Neither is there salvation in any other: for there is none other name under heaven given among men, whereby we must be saved."},{"r":"Acts 16:31","t":"And they said, Believe on the Lord Jesus Christ, and thou shalt be saved, and thy house."},{"r":"Acts 17:28","t":"For in him we live, and move, and have our being; as certain also of your own poets have said, For we are also his offspring."},{"r":"Acts 20:24","t":"But none of these things move me, neither count I my life dear unto myself, so that I might finish my course with joy, and the ministry, which I have received of the Lord Jesus, to testify the gospel of the grace of God."},{"r":"Acts 20:35","t":"I have shewed you all things, how that so labouring ye ought to support the weak, and to remember the words of the Lord Jesus, how he said, It is more blessed to give than to receive."},{"r":"Romans 1:16","t":"For I am not ashamed of the gospel of Christ: for it is the power of God unto salvation to every one that believeth; to the Jew first, and also to the Greek."},{"r":"Romans 3:23–24","t":"For all have sinned, and come short of the glory of God; Being justified freely by his grace through the redemption that is in Christ Jesus:"},{"r":"Romans 5:1","t":"Therefore being justified by faith, we have peace with God through our Lord Jesus Christ:"},{"r":"Romans 5:3–4","t":"And not only so, but we glory in tribulations also: knowing that tribulation worketh patience; And patience, experience; and experience, hope:"},{"r":"Romans 5:8","t":"But God commendeth his love toward us, in that, while we were yet sinners, Christ died for us."},{"r":"Romans 6:23","t":"For the wages of sin is death; but the gift of God is eternal life through Jesus Christ our Lord."},{"r":"Romans 8:1","t":"There is therefore now no condemnation to them which are in Christ Jesus, who walk not after the flesh, but after the Spirit."},{"r":"Romans 8:18","t":"For I reckon that the sufferings of this present time are not worthy to be compared with the glory which shall be revealed in us."},{"r":"Romans 8:26","t":"Likewise the Spirit also helpeth our infirmities: for we know not what we should pray for as we ought: but the Spirit itself maketh intercession for us with groanings which cannot be uttered."},{"r":"Romans 8:28","t":"And we know that all things work together for good to them that love God, to them who are the called according to his purpose."},{"r":"Romans 8:31","t":"What shall we then say to these things? If God be for us, who can be against us?"},{"r":"Romans 8:37","t":"Nay, in all these things we are more than conquerors through him that loved us."},{"r":"Romans 8:38–39","t":"For I am persuaded, that neither death, nor life, nor angels, nor principalities, nor powers, nor things present, nor things to come, Nor height, nor depth, nor any other creature, shall be able to separate us from the love of God, which is in Christ Jesus our Lord."},{"r":"Romans 10:9","t":"That if thou shalt confess with thy mouth the Lord Jesus, and shalt believe in thine heart that God hath raised him from the dead, thou shalt be saved."},{"r":"Romans 12:1","t":"I beseech you therefore, brethren, by the mercies of God, that ye present your bodies a living sacrifice, holy, acceptable unto God, which is your reasonable service."},{"r":"Romans 12:2","t":"And be not conformed to this world: but be ye transformed by the renewing of your mind, that ye may prove what is that good, and acceptable, and perfect, will of God."},{"r":"Romans 12:12","t":"Rejoicing in hope; patient in tribulation; continuing instant in prayer;"},{"r":"Romans 12:21","t":"Be not overcome of evil, but overcome evil with good."},{"r":"Romans 15:13","t":"Now the God of hope fill you with all joy and peace in believing, that ye may abound in hope, through the power of the Holy Ghost."},{"r":"1 Corinthians 1:18","t":"For the preaching of the cross is to them that perish foolishness; but unto us which are saved it is the power of God."},{"r":"1 Corinthians 2:9","t":"But as it is written, Eye hath not seen, nor ear heard, neither have entered into the heart of man, the things which God hath prepared for them that love him."},{"r":"1 Corinthians 6:19–20","t":"What? know ye not that your body is the temple of the Holy Ghost which is in you, which ye have of God, and ye are not your own? For ye are bought with a price: therefore glorify God in your body, and in your spirit, which are God’s."},{"r":"1 Corinthians 10:13","t":"There hath no temptation taken you but such as is common to man: but God is faithful, who will not suffer you to be tempted above that ye are able; but will with the temptation also make a way to escape, that ye may be able to bear it."},{"r":"1 Corinthians 10:31","t":"Whether therefore ye eat, or drink, or whatsoever ye do, do all to the glory of God."},{"r":"1 Corinthians 13:4–5","t":"Charity suffereth long, and is kind; charity envieth not; charity vaunteth not itself, is not puffed up, Doth not behave itself unseemly, seeketh not her own, is not easily provoked, thinketh no evil;"},{"r":"1 Corinthians 13:7","t":"Beareth all things, believeth all things, hopeth all things, endureth all things."},{"r":"1 Corinthians 13:13","t":"And now abideth faith, hope, charity, these three; but the greatest of these is charity."},{"r":"1 Corinthians 15:3–4","t":"For I delivered unto you first of all that which I also received, how that Christ died for our sins according to the scriptures; And that he was buried, and that he rose again the third day according to the scriptures:"},{"r":"1 Corinthians 15:58","t":"Therefore, my beloved brethren, be ye stedfast, unmoveable, always abounding in the work of the Lord, forasmuch as ye know that your labour is not in vain in the Lord."},{"r":"2 Corinthians 1:3–4","t":"Blessed be God, even the Father of our Lord Jesus Christ, the Father of mercies, and the God of all comfort; Who comforteth us in all our tribulation, that we may be able to comfort them which are in any trouble, by the comfort wherewith we ourselves are comforted of God."},{"r":"2 Corinthians 3:17","t":"Now the Lord is that Spirit: and where the Spirit of the Lord is, there is liberty."},{"r":"2 Corinthians 4:17–18","t":"For our light affliction, which is but for a moment, worketh for us a far more exceeding and eternal weight of glory; While we look not at the things which are seen, but at the things which are not seen: for the things which are seen are temporal; but the things which are not seen are eternal."},{"r":"2 Corinthians 5:7","t":"(For we walk by faith, not by sight:)"},{"r":"2 Corinthians 5:17","t":"Therefore if any man be in Christ, he is a new creature: old things are passed away; behold, all things are become new."},{"r":"2 Corinthians 5:21","t":"For he hath made him to be sin for us, who knew no sin; that we might be made the righteousness of God in him."},{"r":"2 Corinthians 9:7","t":"Every man according as he purposeth in his heart, so let him give; not grudgingly, or of necessity: for God loveth a cheerful giver."},{"r":"2 Corinthians 12:9","t":"And he said unto me, My grace is sufficient for thee: for my strength is made perfect in weakness. Most gladly therefore will I rather glory in my infirmities, that the power of Christ may rest upon me."},{"r":"2 Corinthians 13:14","t":"The grace of the Lord Jesus Christ, and the love of God, and the communion of the Holy Ghost, be with you all. Amen."},{"r":"Galatians 2:20","t":"I am crucified with Christ: nevertheless I live; yet not I, but Christ liveth in me: and the life which I now live in the flesh I live by the faith of the Son of God, who loved me, and gave himself for me."},{"r":"Galatians 5:1","t":"Stand fast therefore in the liberty wherewith Christ hath made us free, and be not entangled again with the yoke of bondage."},{"r":"Galatians 5:22–23","t":"But the fruit of the Spirit is love, joy, peace, longsuffering, gentleness, goodness, faith, Meekness, temperance: against such there is no law."},{"r":"Galatians 6:2","t":"Bear ye one another’s burdens, and so fulfil the law of Christ."},{"r":"Galatians 6:9","t":"And let us not be weary in well doing: for in due season we shall reap, if we faint not."},{"r":"Ephesians 2:8–9","t":"For by grace are ye saved through faith; and that not of yourselves: it is the gift of God: Not of works, lest any man should boast."},{"r":"Ephesians 2:10","t":"For we are his workmanship, created in Christ Jesus unto good works, which God hath before ordained that we should walk in them."},{"r":"Ephesians 3:17–19","t":"That Christ may dwell in your hearts by faith; that ye, being rooted and grounded in love, May be able to comprehend with all saints what is the breadth, and length, and depth, and height; And to know the love of Christ, which passeth knowledge, that ye might be filled with all the fulness of God."},{"r":"Ephesians 3:20","t":"Now unto him that is able to do exceeding abundantly above all that we ask or think, according to the power that worketh in us,"},{"r":"Ephesians 4:2–3","t":"With all lowliness and meekness, with longsuffering, forbearing one another in love; Endeavouring to keep the unity of the Spirit in the bond of peace."},{"r":"Ephesians 4:29","t":"Let no corrupt communication proceed out of your mouth, but that which is good to the use of edifying, that it may minister grace unto the hearers."},{"r":"Ephesians 4:32","t":"And be ye kind one to another, tenderhearted, forgiving one another, even as God for Christ’s sake hath forgiven you."},{"r":"Ephesians 6:10–11","t":"Finally, my brethren, be strong in the Lord, and in the power of his might. Put on the whole armour of God, that ye may be able to stand against the wiles of the devil."},{"r":"Philippians 1:6","t":"Being confident of this very thing, that he which hath begun a good work in you will perform it until the day of Jesus Christ:"},{"r":"Philippians 1:21","t":"For to me to live is Christ, and to die is gain."},{"r":"Philippians 2:3–4","t":"Let nothing be done through strife or vainglory; but in lowliness of mind let each esteem other better than themselves. Look not every man on his own things, but every man also on the things of others."},{"r":"Philippians 2:9–11","t":"Wherefore God also hath highly exalted him, and given him a name which is above every name: That at the name of Jesus every knee should bow, of things in heaven, and things in earth, and things under the earth; And that every tongue should confess that Jesus Christ is Lord, to the glory of God the Father."},{"r":"Philippians 3:13–14","t":"Brethren, I count not myself to have apprehended: but this one thing I do, forgetting those things which are behind, and reaching forth unto those things which are before, I press toward the mark for the prize of the high calling of God in Christ Jesus."},{"r":"Philippians 4:4","t":"Rejoice in the Lord alway: and again I say, Rejoice."},{"r":"Philippians 4:6–7","t":"Be careful for nothing; but in every thing by prayer and supplication with thanksgiving let your requests be made known unto God. And the peace of God, which passeth all understanding, shall keep your hearts and minds through Christ Jesus."},{"r":"Philippians 4:8","t":"Finally, brethren, whatsoever things are true, whatsoever things are honest, whatsoever things are just, whatsoever things are pure, whatsoever things are lovely, whatsoever things are of good report; if there be any virtue, and if there be any praise, think on these things."},{"r":"Philippians 4:13","t":"I can do all things through Christ which strengtheneth me."},{"r":"Philippians 4:19","t":"But my God shall supply all your need according to his riches in glory by Christ Jesus."},{"r":"Colossians 1:17","t":"And he is before all things, and by him all things consist."},{"r":"Colossians 3:12","t":"Put on therefore, as the elect of God, holy and beloved, bowels of mercies, kindness, humbleness of mind, meekness, longsuffering;"},{"r":"Colossians 3:15","t":"And let the peace of God rule in your hearts, to the which also ye are called in one body; and be ye thankful."},{"r":"Colossians 3:17","t":"And whatsoever ye do in word or deed, do all in the name of the Lord Jesus, giving thanks to God and the Father by him."},{"r":"Colossians 3:23","t":"And whatsoever ye do, do it heartily, as to the Lord, and not unto men;"},{"r":"1 Thessalonians 5:11","t":"Wherefore comfort yourselves together, and edify one another, even as also ye do."},{"r":"1 Thessalonians 5:16–18","t":"Rejoice evermore. Pray without ceasing. In every thing give thanks: for this is the will of God in Christ Jesus concerning you."},{"r":"2 Thessalonians 3:3","t":"But the Lord is faithful, who shall stablish you, and keep you from evil."},{"r":"1 Timothy 4:12","t":"Let no man despise thy youth; but be thou an example of the believers, in word, in conversation, in charity, in spirit, in faith, in purity."},{"r":"1 Timothy 6:6","t":"But godliness with contentment is great gain."},{"r":"2 Timothy 1:7","t":"For God hath not given us the spirit of fear; but of power, and of love, and of a sound mind."},{"r":"2 Timothy 2:15","t":"Study to shew thyself approved unto God, a workman that needeth not to be ashamed, rightly dividing the word of truth."},{"r":"2 Timothy 3:16–17","t":"All scripture is given by inspiration of God, and is profitable for doctrine, for reproof, for correction, for instruction in righteousness: That the man of God may be perfect, throughly furnished unto all good works."},{"r":"2 Timothy 4:7","t":"I have fought a good fight, I have finished my course, I have kept the faith:"},{"r":"Titus 3:5","t":"Not by works of righteousness which we have done, but according to his mercy he saved us, by the washing of regeneration, and renewing of the Holy Ghost;"},{"r":"Hebrews 4:12","t":"For the word of God is quick, and powerful, and sharper than any twoedged sword, piercing even to the dividing asunder of soul and spirit, and of the joints and marrow, and is a discerner of the thoughts and intents of the heart."},{"r":"Hebrews 4:16","t":"Let us therefore come boldly unto the throne of grace, that we may obtain mercy, and find grace to help in time of need."},{"r":"Hebrews 10:23","t":"Let us hold fast the profession of our faith without wavering; (for he is faithful that promised;)"},{"r":"Hebrews 10:24–25","t":"And let us consider one another to provoke unto love and to good works: Not forsaking the assembling of ourselves together, as the manner of some is; but exhorting one another: and so much the more, as ye see the day approaching."},{"r":"Hebrews 11:1","t":"Now faith is the substance of things hoped for, the evidence of things not seen."},{"r":"Hebrews 11:6","t":"But without faith it is impossible to please him: for he that cometh to God must believe that he is, and that he is a rewarder of them that diligently seek him."},{"r":"Hebrews 12:1–2","t":"Wherefore seeing we also are compassed about with so great a cloud of witnesses, let us lay aside every weight, and the sin which doth so easily beset us, and let us run with patience the race that is se /* ============ day logic ============ */
let offset = 0; // days from today, for browsing

function dayInfo(){
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() + offset);
  const start = new Date(d.getFullYear(), 0, 1);
  const doy = Math.floor((d - start) / 86400000) + 1;
  return { d, doy };
}
function todayKey(){
  const t = new Date();
  return t.getFullYear() + "-" + String(t.getMonth()+1).padStart(2,"0") + "-" + String(t.getDate()).padStart(2,"0");
}

/* ============ catechism (loaded from catechism.json, cached) ============ */
let CAT = null;
function loadCatechism(){
  try {
    const cached = localStorage.getItem("abbey.catechism");
    if (cached) { CAT = JSON.parse(cached); render(); }
  } catch(e){}
  fetch("catechism.json", {cache:"no-cache"})
    .then(r => { if (!r.ok) throw 0; return r.json(); })
    .then(data => {
      if (Array.isArray(data) && data.length) {
        CAT = data;
        try { localStorage.setItem("abbey.catechism", JSON.stringify(data)); } catch(e){}
        render();
      }
    })
    .catch(() => { if (!CAT) render(); });
}

/* ============ prayer list state ============ */
function loadPeople(){
  try { return JSON.parse(localStorage.getItem("abbey.people")) || []; }
  catch(e){ return []; }
}
function savePeople(p){ localStorage.setItem("abbey.people", JSON.stringify(p)); }
function loadChecks(){
  let all = {};
  try { all = JSON.parse(localStorage.getItem("abbey.checks")) || {}; } catch(e){}
  const key = todayKey();
  const today = all[key] || [];
  // prune old days
  const fresh = {}; fresh[key] = today;
  localStorage.setItem("abbey.checks", JSON.stringify(fresh));
  return today;
}
function saveChecks(ids){
  const fresh = {}; fresh[todayKey()] = ids;
  localStorage.setItem("abbey.checks", JSON.stringify(fresh));
}

/* ============ rendering ============ */
const $ = id => document.getElementById(id);

function render(){
  const { d, doy } = dayInfo();
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  $("dateline").textContent = days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate();
  $("todayBtn").classList.toggle("show", offset !== 0);

  // verse
  const v = VERSES[((doy - 1) % 365 + 365) % 365];
  $("verseEyebrow").textContent = "The Word \u00b7 Day " + doy;
  $("verseText").textContent = v.t;
  $("verseRef").textContent = v.r;

  // catechism
  const card = $("catCard");
  if (CAT && CAT.length) {
    const q = CAT[((doy - 1) % CAT.length + CAT.length) % CAT.length];
    $("catEyebrow").textContent = "To Be a Christian \u00b7 Question " + q.n + " of " + CAT.length;
    let ans = q.a, refs = "";
    const m = ans.match(/\(([^()]*\d[^()]*)\)\s*$/);
    if (m) { refs = m[0]; ans = ans.slice(0, m.index).trim(); }
    card.innerHTML =
      '<p class="cat-q"><span class="qmark">Q.</span>' + esc(q.q) + '</p>' +
      '<p class="cat-a"><span class="amark">A.</span>' + esc(ans) + '</p>' +
      (refs ? '<p class="cat-refs">' + esc(refs) + '</p>' : '') +
      '<p class="cat-source">To Be a Christian: An Anglican Catechism<br>&copy; 2020 The Anglican Church in North America</p>';
  } else {
    $("catEyebrow").textContent = "To Be a Christian";
    card.innerHTML =
      '<div class="setup-card">The catechism is not loaded yet. Upload <code>catechism.json</code> to the same folder as this app (see the README for the one-step script), then reopen the app.</div>';
  }

  renderPrayer();
}

function esc(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderPrayer(){
  const people = loadPeople();
  const checks = loadChecks();
  const list = $("prayList");
  list.innerHTML = "";
  $("prayEmpty").style.display = people.length ? "none" : "block";
  people.forEach(p => {
    const li = document.createElement("li");
    li.className = "pray-row" + (checks.includes(p.id) ? " done" : "");
    li.setAttribute("role","checkbox");
    li.setAttribute("aria-checked", checks.includes(p.id));
    li.tabIndex = 0;
    li.innerHTML =
      '<span class="pmark"><svg viewBox="0 0 24 24" fill="none" stroke="#f3ede1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5 9.5 18 20 6.5"/></svg></span>' +
      '<span><span class="pname">' + esc(p.name) + '</span>' +
      (p.note ? '<div class="pnote">' + esc(p.note) + '</div>' : '') + '</span>' +
      '<button class="premove" aria-label="Remove ' + esc(p.name) + '">Remove</button>';
    li.addEventListener("click", e => {
      if (e.target.closest(".premove")) {
        if (confirm("Remove " + p.name + " from your prayer list?")) {
          savePeople(loadPeople().filter(x => x.id !== p.id));
          renderPrayer();
        }
        return;
      }
      if (document.body.classList.contains("editing")) return;
      const cur = loadChecks();
      const next = cur.includes(p.id) ? cur.filter(i => i !== p.id) : cur.concat(p.id);
      saveChecks(next);
      renderPrayer();
    });
    li.addEventListener("keydown", e => {
      if (e.key === " " || e.key === "Enter") { e.preventDefault(); li.click(); }
    });
    list.appendChild(li);
  });
  const done = people.filter(p => checks.includes(p.id)).length;
  $("prayProgress").textContent = people.length ? done + " of " + people.length : "";
  $("prayDone").classList.toggle("show", people.length > 0 && done === people.length);
}

/* ============ interactions ============ */
document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    document.querySelectorAll("section").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    $(t.dataset.tab).classList.add("active");
    window.scrollTo({top:0});
  });
});
$("prevDay").addEventListener("click", () => { offset--; render(); });
$("nextDay").addEventListener("click", () => { offset++; render(); });
$("todayBtn").addEventListener("click", () => { offset = 0; render(); });

$("addBtn").addEventListener("click", () => {
  $("addForm").classList.add("show");
  $("nameInput").focus();
});
$("cancelBtn").addEventListener("click", () => {
  $("addForm").classList.remove("show");
  $("nameInput").value = ""; $("noteInput").value = "";
});
$("saveBtn").addEventListener("click", () => {
  const name = $("nameInput").value.trim();
  if (!name) { $("nameInput").focus(); return; }
  const people = loadPeople();
  people.push({ id: Date.now() + "-" + Math.random().toString(36).slice(2,7), name, note: $("noteInput").value.trim() });
  savePeople(people);
  $("nameInput").value = ""; $("noteInput").value = "";
  $("nameInput").focus();
  renderPrayer();
});
$("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") $("saveBtn").click(); });
$("noteInput").addEventListener("keydown", e => { if (e.key === "Enter") $("saveBtn").click(); });
$("editBtn").addEventListener("click", () => {
  document.body.classList.toggle("editing");
  $("editBtn").textContent = document.body.classList.contains("editing") ? "Done" : "Edit list";
});

/* midnight rollover while app stays open */
let lastKey = todayKey();
setInterval(() => {
  if (todayKey() !== lastKey) { lastKey = todayKey(); offset = 0; render(); }
}, 60000);

/* ============ boot ============ */
render();
loadCatechism();
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
